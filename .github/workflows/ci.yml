name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest discover -s planner/tests
          python -m unittest discover -s orchestrator/tests
          python -m unittest discover -s retriever/tests
          python -m unittest discover -s paper_triage/tests
          python -m unittest discover -s paper_reader/tests
          python -m unittest discover -s evidence_db/tests
          python -m unittest discover -s synthesis/tests
          python -m unittest discover -s verification/tests
          python -m unittest discover -s final_qa/tests
          python -m unittest discover -s comparison/tests
          python -m unittest discover -s experiment/tests
          python -m unittest discover -s writer/tests
          python -m unittest discover -s llm/tests

      - name: Run offline demo
        run: python examples/demo/run_demo.py
